# ============================================================================
# Production compose — erp-frontend
# Usage: docker compose -f .docker/compose.prod.yml up -d
# ============================================================================

services:
  web:
    build:
      context: ..
      dockerfile: .docker/Dockerfile
      target: runner
    restart: always
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    env_file:
      - ../.env.production
    environment:
      NODE_ENV: production
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
